name: Sync and Rebuild Main Branch

on:
  push:
    branches:
      - action # 当 action 分支有代码推送时自动触发
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击触发

permissions:
  contents: write # 必须赋予写入权限，否则机器人无法强制推送到 main 分支

jobs:
  rebuild-main:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取当前仓库的 action 分支（为了获取你存放的 “前缀.Dockerfile”）
      - name: Checkout Current Action Branch
        uses: actions/checkout@v4
        with:
          ref: action
          path: current-action-repo

      # 2. 拉取外部的目标仓库 Droidspaces-rootfs-builder 到 builder-folder 文件夹
      - name: Clone External Repository
        run: |
          git clone https://github.com/Droidspaces/Droidspaces-rootfs-builder.git builder-folder

      # 3 & 4. 替换 Dockerfile 并将当前 Action 脚本自身备份至目标目录
      - name: Process Files and Keep Workflow
        run: |
          # 删除外部仓库中原本的 “前缀.Dockerfile”
          # （注：请根据你实际的文件名替换下面的 “前缀.Dockerfile”）
          rm -f builder-folder/前缀.Dockerfile
          
          # 将当前 action 分支根目录下的 “前缀.Dockerfile” 复制到目标文件夹
          cp current-action-repo/前缀.Dockerfile builder-folder/
          
          # 确保目标文件夹中存在 .github/workflows 目录（容错处理）
          mkdir -p builder-folder/.github/workflows
          
          # 将此工作流文件自身复制过去，确保覆盖后的 main 分支也常驻此文件，从而激活网页端手动运行按钮
          cp current-action-repo/.github/workflows/sync-to-main.yml builder-folder/.github/workflows/

      # 5. 清空旧 main 分支并用全新内容强制覆盖
      - name: Initialize New Git and Push to Main
        run: |
          cd builder-folder
          
          # 关键：切断外部仓库原本的 Git 历史（删除 .git 文件夹），使其变成纯文件
          rm -rf .git
          
          # 重新初始化一个全新的本地 Git 仓库
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 创建并切换到 main 分支
          git checkout -b main
          
          # 暂存所有文件（外部仓库原本的文件、隐藏的 workflows 文件夹、以及你替换的 Dockerfile 都会被整体打包）
          git add -A
          
          # 提交本地修改
          git commit -m "Auto-rebuild main branch from action trigger ($(date +'%Y-%m-%d %H:%M:%S'))"
          
          # 关联当前仓库的远程地址，并使用内置的 GITHUB_TOKEN 强制推送覆盖远程 main 分支
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -f origin main
