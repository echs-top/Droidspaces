name: Sync and Rebuild Main Branch

on:
  push:
    branches:
      - action # 当 action 分支有代码推送时自动触发
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击触发

jobs:
  rebuild-main:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取当前仓库的 action 分支到 current-action-repo 临时文件夹
      - name: Checkout Current Action Branch
        uses: actions/checkout@v4
        with:
          ref: action
          path: current-action-repo

      # 2. 拉取外部的目标仓库到指定的 /Droidspaces 文件夹
      - name: Clone External Repository
        run: |
          git clone https://github.com/Droidspaces/Droidspaces-rootfs-builder.git Droidspaces

      # 3 & 4. 自动替换 Dockerfile 并在本地对目标 Action 文件进行“外科手术”
      - name: Process Files and Keep Workflow
        run: |
          # 1. 删除外部 Droidspaces 文件夹中原本自带的 *.Dockerfile 文件
          rm -f Droidspaces/*.Dockerfile
          
          # 2. 自动把你 action 分支根目录下的任何 .Dockerfile 复制到 Droidspaces 文件夹中
          cp current-action-repo/*.Dockerfile Droidspaces/
          
          # 3. 确保 Droidspaces 文件夹中存在 .github/workflows 目录
          mkdir -p Droidspaces/.github/workflows
          
          # 4. 【核心修复】：动态剔除外部工作流中写死的 NixOS 任务，并修改 release 的依赖
          # 使用 yq 强行删掉 jobs.build-nixos，并将 release 任务的 needs 改为仅依赖 setup 和 build
          if [ -f "Droidspaces/.github/workflows/build-rootfs-releases.yml" ]; then
            yq eval 'del(.jobs.build-nixos) | .jobs.release.needs = ["setup", "build"]' -i Droidspaces/.github/workflows/build-rootfs-releases.yml
          fi
          
          # 5. 将此同步工作流文件自身复制过去，确保覆盖后的 main 分支也常驻此文件
          cp current-action-repo/.github/workflows/sync-to-main.yml Droidspaces/.github/workflows/

      # 5. 清空旧 main 分支并用全新内容强制覆盖
      - name: Initialize New Git and Push to Main
        run: |
          cd Droidspaces
          
          # 关键：删除 /Droidspaces 文件夹里外部仓库原本的 .git 历史，使其变成纯文件
          rm -rf .git
          
          # 重新初始化一个全新的本地 Git 仓库
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 创建并切换到 main 分支
          git checkout -b main
          
          # 暂存所有文件（外部仓库处理后的文件、精简后的工作流、以及你刚复制进去的 Dockerfile）
          git add -A
          
          # 提交本地修改
          git commit -m "Auto-rebuild main branch from action trigger ($(date +'%Y-%m-%d %H:%M:%S'))"
          
          # 使用已配置好最高 workflow 权限的 PAT_TOKEN 强制推送覆盖远程 main 分支
          git remote add origin "https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -f origin main
