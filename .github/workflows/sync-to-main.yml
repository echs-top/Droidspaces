name: Sync and Rebuild Main Branch

on:
  push:
    branches:
      - action # 当 action 分支有代码推送时触发
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击触发

permissions:
  contents: write # 必须赋予写入权限，否则无法推送到 main 分支

jobs:
  rebuild-main:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取当前仓库的 action 分支（获取你存放的 “前缀.Dockerfile”）
      - name: Checkout Current Action Branch
        uses: actions/checkout@v4
        with:
          ref: action
          path: current-action-repo

      # 2. 拉取外部的目标仓库 Droidspaces-rootfs-builder 到 builder-folder 文件夹
      - name: Clone External Repository
        run: |
          git clone https://github.com/Droidspaces/Droidspaces-rootfs-builder.git builder-folder

      # 3. 删除外部仓库中的 “前缀.Dockerfile”
      # 4. 从 action 分支把最新的 “前缀.Dockerfile” 复制过去
      - name: Replace Dockerfile
        run: |
          # 如果你的“前缀”是某种特定格式（如 *.Dockerfile），可以自行修改下面这行
          rm -f builder-folder/前缀.Dockerfile
          
          # 将 action 分支根目录的 Dockerfile 复制到新仓库中
          cp current-action-repo/前缀.Dockerfile builder-folder/

      # 5. 清空并强制覆盖远程 main 主分支
      - name: Initialize New Git and Push to Main
        run: |
          cd builder-folder
          
          # 关键点：删掉外部仓库原本的 .git 历史，使其变成一个纯粹的文件夹
          rm -rf .git
          
          # 重新初始化本地 Git
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 切换到 main 分支
          git checkout -b main
          
          # 将所有文件（包含外部仓库自带的 .github/workflows）全部提交
          # 因为重新 init 了，这一步会自动达成“清空旧 main 并完全替换”的效果
          git add -A
          git commit -m "Auto-rebuild main branch from action trigger ($(date +'%Y-%m-%d %H:%M:%S'))"
          
          # 使用 GITHUB_TOKEN 鉴权并强制推送到当前仓库的 main 分支
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -f origin main
